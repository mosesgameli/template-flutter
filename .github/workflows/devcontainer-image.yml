name: Build Devcontainer Image

on:
    push:
        branches:
            - main
        paths:
            - .devcontainer/Dockerfile
            - .github/workflows/devcontainer-image.yml
    workflow_dispatch:
    schedule:
        - cron: "0 4 * * 1"

permissions:
    contents: read
    packages: write

env:
    IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
    build:
        name: Build linux/amd64 image
        runs-on: ubuntu-24.04

        steps:
            - name: Check out repository
              uses: actions/checkout@v6.0.2

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4.1.0

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v4.2.0
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Generate image metadata
              id: meta
              uses: docker/metadata-action@v6.1.0
              with:
                  images: ${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=sha,prefix=
                  labels: |
                      org.opencontainers.image.title=Flutter Android Codespaces Template
                      org.opencontainers.image.description=Prebuilt Flutter Android devcontainer for GitHub Codespaces

            - name: Build and publish image
              uses: docker/build-push-action@v7.2.0
              with:
                  context: .devcontainer
                  file: .devcontainer/Dockerfile
                  platforms: linux/amd64
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
